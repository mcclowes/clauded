name: Clauded
options:
  bundleIdPrefix: com.mcclowes
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  Clauded:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - NotifyShim/**
      - path: Resources/Assets.xcassets
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mcclowes.clauded
        MARKETING_VERSION: "0.2.1"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/Clauded.entitlements
        ENABLE_HARDENED_RUNTIME: true
        GENERATE_INFOPLIST_FILE: false
    entitlements:
      path: Resources/Clauded.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.network.server: true
        com.apple.security.files.user-selected.read-only: true
    dependencies:
      - target: clauded-notify
        copy:
          destination: executables

  clauded-notify:
    type: tool
    platform: macOS
    sources:
      - path: Sources/NotifyShim
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mcclowes.clauded.notify
        PRODUCT_NAME: clauded-notify
        SKIP_INSTALL: NO
        ENABLE_HARDENED_RUNTIME: true

  ClaudedTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: Clauded
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mcclowes.clauded.tests
        GENERATE_INFOPLIST_FILE: true
